<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="shortcut icon" href="logo.png">
    <title>Password Set</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(180deg, #f8f0fc, #e0f7fa);
            display: flex;
            justify-content: center;
            align-items: center;

            margin: 0;
            color: #333;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 1.75rem;
            box-shadow: 0 1.25rem 2.5rem rgba(0, 0, 0, 0.15);
            max-width: 60%;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-0.313rem);
            box-shadow: 0 1.875rem 3.125rem rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 1.625rem;
            font-weight: 500;
            color: #34495e;
            margin-bottom: 1.25rem;
            letter-spacing: 0.063rem;
        }

        label {
            color: #2c3e50;
            font-weight: 500;
            display: block;
            margin-bottom: 0.625rem;
            font-size: 0.938rem;
            text-align: left;
        }

       input {
    width: 100%;
    padding: 0.875rem;
    margin-bottom: 1.25rem;
    border: 0.125rem solid #dfe6e9;
    border-radius: 0.50rem;
    font-size: 1rem;
    transition: border-color 0.3s, box-shadow 0.3s;
    box-sizing: border-box; /* Add this to include padding and border in the element's width */
}

        input:focus {
            border-color: #2980b9;
            box-shadow: 0 0 0.625rem rgba(41, 128, 185, 0.2);
            outline: none;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #f62f5e, #6dd5fa);
            color: black;
            border: none;
            border-radius: 0.50rem;
            font-size: 1.125rem;
            font-weight: bold;
            
            transition: background 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            color: white;
            background: linear-gradient(135deg, #1f6391, #f62f5e);
            transform: translateY(-0.125rem);
        }

        .error {
            color: #e74c3c;
            margin-bottom: 1.25rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.875rem;
            }

            h2 {
                font-size: 1.375rem;
            }

            button {
                color:white;
                padding: 0.75rem;
                font-size: 0.875rem;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Set New PASSWORD</h2>
        <form onsubmit="event.preventDefault(); savePassword();">
            <div class="error" id="error-message"></div>
            <label for="password1">New Password:</label>
            <input type="text" id="password1" required>

            <label for="password2">Confirm Password:</label>
            <input type="text" id="password2" required>

            <button type="submit">Set it</button>
        </form>
    </div> 

    <script>
        function savePassword(){let e=document.getElementById("password1").value,t=document.getElementById("password2").value,n=document.getElementById("error-message");e===t?(localStorage.removeItem("pin"),localStorage.setItem("pin",e),console.log("pin set",e),setTimeout(function(){window.location.href="index.html"},1e3)):n.textContent="Passwords do not match. Please try again."}
    </script>
    
<script>
    document.body.addEventListener('contextmenu', function(event) {
    event.preventDefault();  // Prevent the right-click context menu
});

    const pass = localStorage.getItem('phonenumberV2');
    if(!pass){
        window.location.href = 'verify.html';
    }
    
</script>
</body>
</html>
