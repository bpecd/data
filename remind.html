// Request Notification Permission
function requestNotificationPermission() {
    if ('Notification' in window) {
        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                console.log('Notification permission granted.');
            } else {
                console.log('Notification permission denied.');
            }
        });
    } else {
        console.log('Notifications are not supported by your browser.');
    }
}

// Send a Notification with a dynamic tag
function sendNotification(title, body, tag) {
    if (Notification.permission === 'granted') {
        const options = {
            body: body,
            icon: 'logo.png', // Example placeholder icon
            tag: tag // Unique tag to prevent overlap
        };
        new Notification(title, options);
    }
}

// Notify User (Notification + Alert)
function notifyUser(title, body, tag) {
    sendNotification(title, body, tag); // Send browser notification
    setTimeout(function() {
        alert(`${title}: ${body}`);
    }, 1500); // Display browser alert
}

// Format date and time to "DD/MM/YYYY HH:MM am/pm"
function formatDateTime(date) {
    const padZero = (num) => (num < 10 ? '0' : '') + num;
    const day = padZero(date.getDate());
    const month = padZero(date.getMonth() + 1); // Months are zero-based
    const year = date.getFullYear();

    let hours = date.getHours();
    const minutes = padZero(date.getMinutes());
    const ampm = hours >= 12 ? 'pm' : 'am';
    hours = hours % 12 || 12; // Convert to 12-hour format
    const formattedTime = `${hours}:${minutes} ${ampm}`;

    return `${day}/${month}/${year} ${formattedTime}`;
}

// Load reminders from localStorage
const loadReminders = () => {
    let reminders = JSON.parse(localStorage.getItem('reminders')) || [];

    // Filter out invalid reminders
    reminders = reminders.filter(reminder => reminder.message && reminder.time);
    localStorage.setItem('reminders', JSON.stringify(reminders));

    if (remindersList) {
        remindersList.innerHTML = '';
        reminders.forEach((reminder, index) => {
            const formattedTime = formatDateTime(new Date(reminder.time));
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${reminder.message} - ${formattedTime}</span>
                ${reminder.notified ? '<span>Done <i style="color: blue;" class="fa-solid fa-bell-slash"></i></span>' : '<span>Waiting <i style="color: red;" class="fa-solid fa-bell-exclamation"></i></span>'}
                <button class="delete-btn" onclick="removeReminder(${index})">X</button>
            `;
            remindersList.appendChild(li);
        });
    }
};

// Add a new reminder
const addReminder = () => {
    const message = document.getElementById('reminderMessage').value;
    const time = document.getElementById('reminderDate').value;

    if (!message || !time) {
        alert('Please enter both a message and a date/time!');
        return;
    }

    const reminders = JSON.parse(localStorage.getItem('reminders')) || [];
    const uniqueTag = `reminder-${Date.now()}`; // Generate a unique tag
    reminders.push({ message, time, tag: uniqueTag, notified: false }); // Add "notified" property
    localStorage.setItem('reminders', JSON.stringify(reminders));
    loadReminders();

    // Clear inputs
    document.getElementById('reminderMessage').value = '';
    document.getElementById('reminderDate').value = '';
};

// Remove a reminder
const removeReminder = (index) => {
    const reminders = JSON.parse(localStorage.getItem('reminders')) || [];
    reminders.splice(index, 1);
    localStorage.setItem('reminders', JSON.stringify(reminders));
    loadReminders();
};

// Check reminders periodically
const checkReminders = () => {
    const reminders = JSON.parse(localStorage.getItem('reminders')) || [];
    const now = new Date();

    reminders.forEach(reminder => {
        const reminderTime = new Date(reminder.time);
        if (!reminder.notified && now >= reminderTime) {
            notifyUser('Reminder', reminder.message, reminder.tag); // Notify user
            reminder.notified = true; // Mark reminder as notified
        }
    });

    localStorage.setItem('reminders', JSON.stringify(reminders));
    loadReminders(); // Refresh the list on the reminders page
};

// Initialize
loadReminders();
setInterval(checkReminders, 1000); // Check every second
document.addEventListener('DOMContentLoaded', requestNotificationPermission);
