<!DOCTYPE html>

      ><style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

        }
        body {

            opacity: 0;
          transform: translateY(5vh);

  @keyframes fadeIn {

        .top-bar {
            display: flex;
            justify-content: space-between;

        }

            color: white;

<body>

    <div class="top-bar">
        <div class="nav-items">
            <a  href="home.html"><i class="fa-duotone fa-solid fa-table"></i> Dashboard</a>

        </div>

    <div class="container">

 </div>

    </div>
    <script>
   const e=JSON.parse(localStorage.getItem("secureData"));e||(window.location.href="index.html"),document.getElementById("img").src=e.img;const stt=e.state;"admin"===stt?document.getElementById("nn").style.display="block":"mod"===stt?document.getElementById("nn").style.display="none":(document.getElementById("nn").style.display="none",document.getElementById("shtl").style.display="none"),document.getElementById("clearButton").addEventListener("click",function t(){localStorage.removeItem("secureData"),localStorage.removeItem("userdata"),window.location.href="index.html"});      </script>
    <script>
       const sheetUrl="https://docs.google.com/spreadsheets/d/1d6A9YXQkEjlQyioOUS5zYc-_bibN_Nt3YmoCQWvv-5s/gviz/tq?gid=138275939";let transactions=[];function displayTransaction(t){let e=document.getElementById("transaction-list");transactions=[];for(let s=t.length-1;s>=0;s--){let a=t[s],n=a.c[0]?.v||"N/A",i=a.c[1]?.v||"N/A",l=a.c[2]?.v||0,r=a.c[3]?.v||"N/A",o=a.c[5]?.v||"N/A",c=a.c[6]?.v||"N/A",d=a.c[7]?.v||"N/A",v=a.c[8]?.v||"N/A",g=a.c[9]?.v||"N/A",u=a.c[10]?.v||0,f=a.c[11]?.v||"N/A",h=a.c[12]?.v||"N/A",y=n;"string"==typeof n&&n.startsWith("Date")&&(y=parseGoogleDate(n));let p=`viewbtn-${s}`;transactions.push({Name:i,Land:l,phone:r,status:o,formattedDate:y,html:`
<div class="transaction" style="display: flex; justify-content: space-between;">
    <div style="flex: 1; text-align: center;">
        ${i}
    </div>
    <div style="flex: 1; text-align: center;">
        ${l}
    </div>
    <div style="flex: 1; text-align: center;">
        ${r}
    </div>
    <div style="flex: 1; text-align: center;">
        ${getStatusIcon(o)} ${o}
    </div>
    <div style="flex: 1; text-align: center;">
        ${y}
    </div>
    <div style="flex: 1; text-align: center;">
        <button class="redirect-btn" id="${p}">View</button>
    </div>
</div>
`}),e.innerHTML+=transactions[transactions.length-1].html,setTimeout(()=>{document.getElementById(p).addEventListener("click",t=>{t.preventDefault(),localStorage.removeItem("userdata");let e={name:i,phone:r,land:l,mail:h,sheetid:c,gid:d,furl:v,sdentry:g,srentry:u,saentry:f,state:o};localStorage.setItem("userdata",JSON.stringify(e)),setTimeout(()=>{window.location.href="ownerid.html"},400)})},400)}}function filterTransactions(){let t=document.getElementById("search-input").value.toLowerCase(),e=document.getElementById("transaction-list");e.innerHTML="",transactions.forEach(s=>{let{Name:a,Land:n,phone:i,status:l,formattedDate:r,html:o}=s;(a.toLowerCase().includes(t)||r.toLowerCase().includes(t)||n.toString().toLowerCase().includes(t)||l.toLowerCase().includes(t)||i.toString().includes(t))&&(e.innerHTML+=o)})}function parseGoogleDate(t){let e=t.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/);if(e){let s=e[1],a=String(parseInt(e[2])+1).padStart(2,"0"),n=String(e[3]).padStart(2,"0");return`${a}/${n}/${s}`}return"Invalid Date"}function getStatusIcon(t){switch(t.toLowerCase()){case"waiting":return'<i class="fa-solid fa-clock" style="color:orange;"></i>';case"working":return'<i class="fa-solid fa-bars-progress" style="color:blue;"></i>';case"end":return'<i class="fa-solid fa-box-check" style="color:green;"></i>';default:return'<i class="fa-solid fa-cloud-question" style="color:gray;"></i>'}}fetch("https://docs.google.com/spreadsheets/d/1d6A9YXQkEjlQyioOUS5zYc-_bibN_Nt3YmoCQWvv-5s/gviz/tq?gid=138275939").then(t=>t.text()).then(t=>{let e=JSON.parse(t.substr(47).slice(0,-2)),s=e.table.rows;displayTransaction(s)}).catch(t=>console.error("Error fetching the Google Sheet data:",t));
    </script>
</body>
</html>
