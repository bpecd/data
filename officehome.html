    const customersSheetUrl = 'https://docs.google.com/spreadsheets/d/1d6A9YXQkEjlQyioOUS5zYc-_bibN_Nt3YmoCQWvv-5s/htmlview';
const suppliersSheetUrl = 'https://docs.google.com/spreadsheets/d/1lyQ0otJ0_h8fFj66SPxaW3EZ6QhlEvGQG1srpc4UVW4/htmlview';

async function fetchSheetData(sheetUrl, skipRows = 2) {
  try {
    const response = await fetch(sheetUrl);
    const text = await response.text();

    // Use DOMParser to parse the HTML and extract the row count
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');
    const rows = doc.querySelectorAll('table tbody tr');

    // Skip the specified number of rows (e.g., header rows)
    const validRows = Array.from(rows).slice(skipRows);
    return validRows.length; // Return the count of valid rows
  } catch (error) {
    console.error('Error fetching sheet data:', error);
    return 0;
  }
}

// Function to animate the number counting
function animateCount(element, max) {
  let count = 0;
  const increment = Math.ceil(max / 50); // Controls animation speed
  const interval = setInterval(() => {
    count += increment;
    if (count > max) {
      count = max;
      clearInterval(interval);
    }
    element.textContent = count;
  }, 30); // Controls animation smoothness
}

// Main function to update the stats for both cards
async function updateStats() {
  // Fetch data for both URLs
  const customersCount = await fetchSheetData(customersSheetUrl);
  const suppliersCount = await fetchSheetData(suppliersSheetUrl);

  // Animate counts
  animateCount(document.getElementById('customers-count'), customersCount);
  animateCount(document.getElementById('suppliers-count'), suppliersCount);
}

// Start updating stats on page load
updateStats();

        setTimeout(function() {

        }, 400); // 300 ms delay
    });
});

// Function to animate and display the value
const displayAnimatedText = (elementId, text) => {
    const displayElement = document.getElementById(elementId);
    const computedStyle = window.getComputedStyle(displayElement);
    const inlineStyle = displayElement.style; // Inline styles

    displayElement.innerHTML = ""; // Clear the element

    text.split("").forEach((char, index) => {
        const span = document.createElement("span");
        span.textContent = char === " " ? "\xa0" : char; // Handle spaces
        span.classList.add("letter");
        span.style.animationDelay = `${0.03 * index}s`;

        // Preserve computed and inline styles
        span.style.color = computedStyle.color;

function formatNumber(num) {
    // Handle negative numbers
    const isNegative = num < 0;
    const absNumStr = Math.abs(num).toString(); // Convert the absolute value to a string
    
    // Split into the last three digits and the rest
    const lastThree = absNumStr.slice(-3);
    let otherNumbers = absNumStr.slice(0, -3);

    if (otherNumbers) {
        // Format the other part with commas every two digits
        otherNumbers = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",");
        return (isNegative ? "-" : "") + otherNumbers + "," + lastThree;
    } else {
        return (isNegative ? "-" : "") + lastThree;
    }
}

function formatNumber2(num) {
    // Convert number to an absolute value for formatting
    let numStr = Math.abs(num).toString(); // Ignore sign for formatting

    // Split last three digits and format the rest in groups of two
    let lastThree = numStr.slice(-3);
    let otherNumbers = numStr.slice(0, -3);

    if (otherNumbers) {
        // Format the other part with commas every two digits
        otherNumbers = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",");
        return otherNumbers + "," + lastThree;
    } else {
        return lastThree;
    }
}

// Debounce Function
function debounce(func, delay) {
    let debounceTimer;
    return function (...args) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => func.apply(this, args), delay);
    };
}

function parseGoogleDate(dateString) {
    const regex = /Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/;
    const matches = dateString.match(regex);

    if (matches) {
        const year = matches[1];
        const month = String(parseInt(matches[2]) + 1).padStart(2, '0'); // Adjust month and pad with zero
        const day = String(matches[3]).padStart(2, '0'); // Pad day with zero
        let hour = parseInt(matches[4]);
        const minute = String(matches[5]).padStart(2, '0'); // Pad minute with zero
        const second = String(matches[6]).padStart(2, '0'); // Pad second with zero

        // Convert to 12-hour format
        const ampm = hour >= 12 ? 'PM' : 'AM';
        hour = hour % 12;
        hour = hour ? String(hour).padStart(2, '0') : '12';  // Pad hour with zero and handle midnight/noon

        // Separate date and time with a line break
        const datePart = `${day}/${month}/${year}`;
        const timePart = `${hour}:${minute}:${second} ${ampm}`;

        return `${datePart}<br>${timePart}`; // Include <br> for line break
    }

    return 'Invalid Date';  // Fallback if parsing fails
}

        progressCircle.style.strokeDashoffset = offset;

        // Update percentage display
        document.querySelector(".percentage").textContent = `${Math.round(overallPercentage)}%`;
    };

    // Main function to execute logic after all elements are ready
    const executeMainLogic = () => {
        const ofcostText = document.getElementById("ofcost").textContent.replace(/,/g, "");
        const totalcText = document.getElementById("total-cost").textContent.replace(/,/g, "");

        // Parse the cleaned text to numbers
        const ofcost = parseFloat(ofcostText);
        const totalc = parseFloat(totalcText);

        // Calculate the difference (owcost)
        let owcost = totalc - ofcost;

        // Ensure owcost is not negative
        owcost = Math.max(0, owcost);

        // Call displayAnimatedText and once it's done, update progress
        displayAnimatedText("blcost", formatNumber(owcost));

        // Wait 1 second (simulate animation duration) before updating the progress bars
        setTimeout(() => {
            // Now that displayAnimatedText has run, update the progress bars
            updateProgressBars();
        }, 500); // Adjust the timeout if your animation takes a different amount of time
    };

    // Interval to check for element availability and retry if not all elements are ready
    const checkAndExecute = () => {
        if (areAllIdsValid(xyz)) {
            executeMainLogic(); // Execute the main logic when elements are ready
        } else {
            console.log("Not all required IDs have valid values. Retrying...");
            setTimeout(checkAndExecute, 1000); // Retry after 1 second
        }
    };

    // Initial call to check for element availability and start the process
    checkAndExecute();
</script>
