      ><style>
        * {

        }
  @keyframes fadeIn {

                opacity: 1;
                transform: translateY(0);
            }
        }
        .container1 {

            color: #000;

        .header .search-bar {

            align-items: center;
            gap: 10px;
        }
        .search-bar input {

            border-radius: 20px;
            outline: none;

    font-size: 32px;

        .transaction {

        .circular-progress {
    margin: 10%;
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background-color: #da1717;
    display: flex;
    align-items: center;
    justify-content: center;
}

.circular-progress::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    clip: rect(0px, 150px, 150px, 75px); /* Half circle clipping */
    background-color: #3128a7;
    transform: rotate(var(--rotation, 0deg)); /* Default rotation at 0deg */
    transition: transform 0.5s ease;
}

.circular-progress::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-color: #3128a7;
    clip: rect(0px, 75px, 150px, 0px); /* Half circle clipping for background */
}

.circular-progress span {
    position: absolute;
    font-size: 24px;
    font-weight: bold;
    color: #ffffff;
    z-index: 1;
}
        .top-bar {
