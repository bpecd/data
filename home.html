        .circular-progress {
    margin: 10%;
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background-color: #da1717;
    display: flex;
    align-items: center;
    justify-content: center;
}

.circular-progress::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    clip: rect(0px, 150px, 150px, 75px); /* Half circle clipping */
    background-color: #3128a7;
    transform: rotate(var(--rotation, 0deg)); /* Default rotation at 0deg */
    transition: transform 0.5s ease;
}

.circular-progress::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-color: #3128a7;
    clip: rect(0px, 75px, 150px, 0px); /* Half circle clipping for background */
}

.circular-progress span {
    position: absolute;
    font-size: 24px;
    font-weight: bold;
    color: #ffffff;
    z-index: 1;
}

    <script>
        document.querySelectorAll('.backbtn').forEach(function(button) {
    button.addEventListener('click', function(event) {

        document.body.classList.add('move-down'); // Adds the class for animation or effect

        document.addEventListener("DOMContentLoaded", function() {
                const url = 'https://docs.google.com/spreadsheets/d/1lyQ0otJ0_h8fFj66SPxaW3EZ6QhlEvGQG1srpc4UVW4/htmlview';
                let t = 0;

async function n(t, n, l, r, o) {
    try {
        let a = await fetch(url),
            i = await a.text(),
            s = new DOMParser(),
            c = s.parseFromString(i, "text/html"),
            d = c.querySelectorAll("table");
        if (d.length <= t) throw Error(`Sheet index ${t} out of bounds`);
        let m = d[t].rows;
        if (m.length <= n) throw Error(`Row index ${n} out of bounds`);
        let u = m[n].cells;
        if (u.length <= l) throw Error(`Cell index ${l} out of bounds`);
        let h = u[l],
            g = h.innerText || h.textContent;
        o
            ? (function e(t, n, l) {
                  let r = document.getElementById(n);
                  (r.innerHTML = ""),
                      t.split("").forEach((e, t) => {
                          let n = document.createElement("span");
                          (n.textContent = " " === e ? "\xa0" : e), n.classList.add(l), (n.style.animationDelay = `${0.1 * t}s`), r.appendChild(n);
                      });
              })(g.trim(), r, o)
            : (document.getElementById(r).innerText = Math.abs(g.trim()));
    } catch (p) {
        console.error("Error fetching data:", p);
    }
}
setTimeout(function() {
    const ofcost = parseFloat(document.getElementById("ofcost").textContent);
    const totalc = parseFloat(document.getElementById("total-cost").textContent);
    let owcost = totalc - ofcost;

    // Ensure owcost is not negative
    owcost = Math.max(0, owcost);

    document.getElementById("blcost").innerText = owcost;
}, 2000);

                function fetchData2() {
                const tbl = 0;
                if (isNaN(tbl)) {
                    console.error('Invalid table number in local storage');
                    return;
                }

                const url = 'https://docs.google.com/spreadsheets/d/1LPv7bORNSyoSM6Kyu7v-7r19HJTiLtI0DKcJ99Xwwr8/htmlview';
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        const parser = new DOMParser();
                        const htmlDoc = parser.parseFromString(data, 'text/html');
                        const tables = htmlDoc.querySelectorAll('table');

                        if (tbl >= tables.length) {
                            console.error('Table number exceeds available tables');
                            
                            return;
                        }

                        const cellElement = tables[tbl].rows[3].cells[4];
                        const cellText = cellElement.innerText || cellElement.textContent;
                        fetchedDataValue = parseFloat(cellText.trim());
                        document.getElementById("ofcost").innerText = Math.abs(cellText.trim());
                    })
                    .catch(error => console.error('Error fetching data:', error));
            }
            fetchData2();
            n(t, 3, 4, "total-cost");
            n(t, 3, 3, "total-receive");
            n(t, 3, 2, "balance");
        });
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1lyQ0otJ0_h8fFj66SPxaW3EZ6QhlEvGQG1srpc4UVW4/gviz/tq?gid=454571186';

        let transactions = [];

        fetch(sheetUrl)
            .then(response => response.text())
            .then(data => {
                const jsonData = JSON.parse(data.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                displayTransaction(rows);
            })
            .catch(error => console.error('Error fetching the Google Sheet data:', error));

        function displayTransaction(rows) {
            const container = document.getElementById('transaction-list');
            transactions = [];

            for (let i = rows.length - 1; i > 0; i--) {
                const row = rows[i];
                const rawDate = row.c[0]?.v || 'N/A';
                const Description = row.c[1]?.v || 0;
                const Reason = row.c[2]?.v || 'N/A';
                const Amount = row.c[3]?.v || 0;
                let formattedDate = rawDate;
        if (typeof rawDate === 'string' && rawDate.startsWith('Date')) {
            formattedDate = parseGoogleDate(rawDate);
        }
                transactions.push({
                    Description: Description,
                    Reason: Reason,
                    Amount: Amount,
                    formattedDate: formattedDate,
                    html: `
    <div class="transaction" style="display: flex; justify-content: space-between;">
        <div style="flex: 1; text-align: center;">
            ${formattedDate}
        </div>
        <div style="flex: 1; text-align: center;">
            ${Description}
        </div>
        <div style="flex: 1; text-align: center;">
            ${Reason}
        </div>
        <div style="flex: 1; text-align: center;" class="transaction-amount ${Amount > 0 ? 'credit' : (Amount < 0 ? 'debit' : 'neutral')}">
    ${Amount > 0 ? '+' : (Amount < 0 ? '-' : '!')} ৳${Math.abs(Amount).toFixed(2)}
</div>

    </div>
`
                });

                container.innerHTML += transactions[transactions.length - 1].html;
            }
        }

        function filterTransactions() {
            const searchValue = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('transaction-list');
            container.innerHTML = '';

            transactions.forEach(transaction => {
                const { Description, Reason, formattedDate, html } = transaction;
                if (
                    formattedDate.toString().includes(searchValue) ||
                    Description.toLowerCase().includes(searchValue) ||
                    Reason.toLowerCase().includes(searchValue)
                ) {
                    container.innerHTML += html;
                }
            });
        }

        function parseGoogleDate(dateString) {
    const regex = /Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/;
    const matches = dateString.match(regex);

            if (matches) {
        const year = matches[1];
        const month = String(parseInt(matches[2]) + 1).padStart(2, '0'); // Adjust month and pad with zero
        const day = String(matches[3]).padStart(2, '0'); // Pad day with zero
        let hour = parseInt(matches[4]);
        const minute = String(matches[5]).padStart(2, '0'); // Pad minute with zero
        const second = String(matches[6]).padStart(2, '0'); // Pad second with zero

        // Convert to 12-hour format
        const ampm = hour >= 12 ? 'PM' : 'AM';
        hour = hour % 12;
        hour = hour ? String(hour).padStart(2, '0') : '12';  // Pad hour with zero and handle midnight/noon

        // Return date in MM/DD/YYYY HH:MM:SS AM/PM format
        return `${day}/${month}/${year} ${hour}:${minute}:${second} ${ampm}`;
    }

    return 'Invalid Date';  // Fallback if parsing fails
}

    <script>
        
        setTimeout( function(){
       // Get costs and calculate percentages
const totalCost = parseInt(document.getElementById("total-cost").innerText);
const totalReceive = parseInt(document.getElementById("total-receive").innerText); // Corrected
const buildCost = parseInt(document.getElementById("blcost").innerText);
const officeCost = parseInt(document.getElementById("ofcost").innerText);

// Calculate build and office percentages
const buildPercentage = (buildCost / totalCost) * 100;
const officePercentage = (officeCost / totalCost) * 100;

// Set width of progress bars
document.getElementById("build-progress").style.width = buildPercentage + "%";
document.getElementById("office-progress").style.width = officePercentage + "%";
// Calculate percentage
const percentage = (totalCost / totalReceive) * 100;
document.getElementById("percentage-text").innerText = `${Math.round(percentage)}%`;

// Calculate rotation and set it
const rotationDegree = percentage * 3.6; // Convert percentage to degrees
document.querySelector(".circular-progress").style.setProperty("--rotation", `${rotationDegree}deg`);

            },4000);    </script>
