<style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

}
body.move-down {
    transform: translateY(5vh);
}
        .container {

            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
            opacity: 0;
          transform: translateY(5vh);
            animation: fadeIn 1s forwards;
        }
  @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;

            margin-bottom: 20px;
            border-radius: 20px;

          transform: translateY(5vh);

        }
  @keyframes fadeIn {

        }
        .top-bar .nav-items {
            display: flex;
            align-items: center;

            display: flex;
            align-items: center;

            text-decoration: none;

            transition: padding 0.8s ease;

        a:hover{
            background-color: #dbdbfd;
            padding: 10px;
            border-radius: 15px;
        }
        .bb{
            width: 80vh;
            display: flex;
            flex-direction: row;
            background-color: wheat;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .top-bar .nav-items a i {
            font-size: 20px;
            color: #096faa;
        }
        
        .top-bar .logo img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            
        }
        

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2rem;
            color: #000;
        }
        .header .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.5s ease; /* Adds space between elements */
}
.search-bar:hover {
  transform: scale(1.05); /* Slightly enlarge the card */
}
        .search-bar input {
            padding: 10px;
            border: 3px dotted blue;
            border-radius: 20px;
            outline: none;
            width: 250px;
        }
        .search-bar .fa-file-spreadsheet {
            color: #096faa;
            font-size: 32px;
        }
        .menu {
            display: flex;
            justify-content: space-between;
            padding: 10px 10px;
            margin-bottom: 2%;
            margin-top: 2%;
            background-color: #ddd;
            border-radius: 20px;
        }
        .menu span {
            padding: 10px 20px;
            background-color: #2edddd;
            border-radius: 20px;
            color: black;
            font-weight: bold;
        }
        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dotted black;
            border-radius:10px;
            padding: 10px;
        }
    .transaction i {
        font-size: 20px;
    }
        .transaction-info {
            flex: 1;
            font-size: 14px;
            
        }
        .transaction-time {
            color: #cfcfcf;
            font-size: 8px;
        } 
        .redirect-btn {
            margin-left: 20px;
            padding: 5px 10px;
            background-color: #ff005d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.5s ease;
        }
        .redirect-btn:hover {
           
  transform: scale(1.05); /* Slightly enlarge the card */
  background-color: #0056b3;
        }.loader {
  width: 50px;
  padding: 8px;position: absolute;
    top: 50%;
    left: 50%;
    margin-top: 100px;
  aspect-ratio: 1;
  border-radius: 50%;
  background: #25b09b;
  --_m: 
    conic-gradient(#0000 10%,#000),
    linear-gradient(#000 0 0) content-box;
  -webkit-mask: var(--_m);
          mask: var(--_m);
  -webkit-mask-composite: source-out;
          mask-composite: subtract;
  animation: l3 1s infinite linear;
}
@keyframes l3 {to{transform: rotate(1turn)}}
.xbb{
    transition: box-shadow 0.5s ease;
}
.xbb:hover{
    box-shadow: rgb(204, 219, 232) 3px 3px 6px 0px inset, rgba(255, 255, 255, 0.5) -3px -3px 6px 1px inset;
    
}

</head>
<body>

    <div class="top-bar">
        <div class="nav-items">
            <a class="backbtn" style="margin-left: 10px;" href="devhome.html"><i class="fa-solid fa-table-tree"></i> Developer Dashboard</a>
            <a class="backbtn" style="color: #db049b;font-weight: bold;font-size: large;background-color: #fae6f4;padding: 10px;border-radius: 15px;" href="developers.html"><i class="fa-solid fa-list-ol"></i> Projects</a>
            <a class="backbtn"id="nn" href="newdev.html"><i class="fas fa-user-plus"></i> New Project</a>
       </div>
       <div style="display: flex;flex-direction: row;gap: 10px;" class="logo">
        <img id="img" src="https://nfcard.github.io/login/user.jpg" alt="Logo"><button class="xbb" style="border: none;font-size: 20px;padding: 10px; border-radius: 15px;position: relative;cursor: pointer;" onclick="window.location.href='home.html'"><i class="fa-solid fa-house-chimney"></i></button>
    </div>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fa fa-list-alt"></i> 
                Project list</h1>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search..." oninput="filterTransactions()">
                <i id="shtl" onclick="window.open('https://docs.google.com/spreadsheets/d/1-eLT3ufiAq5QEUMtJPPl3UFeVlbGuFe_1NSnIgXdncw/edit?gid=2005736034#gid=2005736034', '_blank');" class="fa-duotone fa-solid fa-file-spreadsheet" style="cursor:pointer;"></i>
 </div>
        </div>

        <p>List of all Projects. Click Open for Data Entry.</p>

        <div class="menu">
            <span>No.</span>
            <span>Project Name</span>
            <span>Land Area</span>
            <span>Phone No.</span>
            <span>Assign Date</span>
            <span>ID</span>
        </div>
        <div style="margin-top:-25px" id="transaction-list">
            <div class="loader"></div> <!-- Transactions will be dynamically inserted here -->
        </div>
    </div><script type="text/javascript" src="reminder.js"></script>
    <script> 
    
         document.querySelectorAll('.backbtn').forEach(function(button) {
    button.addEventListener('click', function(event) {
        event.preventDefault(); // Prevents immediate navigation
        document.body.classList.add('move-down'); // Adds the class for animation or effect

        setTimeout(function() {
            window.location.href = button.getAttribute('href'); // Navigates after 0.4s delay
        }, 400); // 300 ms delay
    });
});

    const e = JSON.parse(localStorage.getItem("secureData"));
        if (!e) {
            window.location.href = "index.html";
        }
         document.getElementById("img").src = e.img;
        const popupOverlay = document.createElement('div');
                const popupImage = document.createElement('img');

                // Set styles for the popup overlay
                popupOverlay.style.position = "fixed";
                popupOverlay.style.top = "0";
                popupOverlay.style.left = "0";
                popupOverlay.style.width = "100%";
                popupOverlay.style.height = "100%";
                popupOverlay.style.backgroundColor = "rgba(0, 0, 0, 0.8)";
                popupOverlay.style.display = "none";
                popupOverlay.style.justifyContent = "center";
                popupOverlay.style.alignItems = "center";

                // Set styles for the popup image
                popupImage.style.maxWidth = "90%";
                popupImage.style.maxHeight = "90%";
                popupImage.style.borderRadius = "10px";
                popupImage.style.boxShadow = "0 5px 15px rgba(0, 0, 0, 0.5)";

                // Append the image to the popup overlay
                popupOverlay.appendChild(popupImage);

                // Append the popup overlay to the body
                document.body.appendChild(popupOverlay);

                // Add event listener to the original image to show the popup
                document.getElementById("img").addEventListener('click', function () {
                    popupImage.src = e.img;  // Set the image source for the popup
                    popupOverlay.style.display = "flex";  // Show the popup
                });

                // Add event listener to the popup to close it when clicked
                popupOverlay.addEventListener('click', function (e) {
                    if (e.target === popupOverlay) {
                        popupOverlay.style.display = "none";  // Hide the popup
                    }
                });
         const stt = e.state;
         if(stt === "admin"){
                document.getElementById("nn").style.display = "block";
             } else if(stt === "mod"){
                document.getElementById("nn").style.display = "none";
             }else{
                document.getElementById("nn").style.display = "none";
                document.getElementById('shtl').style.display = 'none';
             }
        
         
         
         </script>
    <script>
         const sheetUrl = 'https://docs.google.com/spreadsheets/d/1-eLT3ufiAq5QEUMtJPPl3UFeVlbGuFe_1NSnIgXdncw/gviz/tq?gid=2005736034';

let transactions = [];

fetch(sheetUrl)
    .then(response => response.text())
    .then(data => {
        const jsonData = JSON.parse(data.substr(47).slice(0, -2));
        const rows = jsonData.table.rows;
        displayTransaction(rows);
    })
    .catch(error => console.error('Error fetching the Google Sheet data:', error));

function displayTransaction(rows) {
    const container = document.getElementById('transaction-list');
    transactions = [];

    // Start serial number from the total count of rows
    let serialNumber = rows.length;

    for (let i = rows.length - 1; i >= 0; i--) {
        const row = rows[i];
        const rawDate = row.c[0]?.v || 'N/A';
        const Name = row.c[1]?.v || 'N/A';
        const Land = row.c[2]?.v || 0;
        const Status = row.c[3]?.v || 'N/A';
        const sheetid = row.c[4]?.v || 'N/A';
        const sheetid2 = row.c[5]?.v || 'N/A';
        const sgid = row.c[6]?.v || 'N/A';
        const sgid2 = row.c[7]?.v || 'N/A';
        const formid = row.c[8]?.v || 0;
        const formid2 = row.c[9]?.v || 'N/A';
        const sdentry = row.c[10]?.v || 'N/A';
        const sdentry2 = row.c[11]?.v || 'N/A';
        const srentry = row.c[12]?.v || 'N/A';
        const srentry2 = row.c[13]?.v || 'N/A';
        const saentry = row.c[14]?.v || 'N/A';
        const saentry2 = row.c[15]?.v || 0;
        const nameen = row.c[16]?.v || 'N/A';
        const phoneen = row.c[17]?.v || 'N/A';
        const houseen = row.c[18]?.v || 'N/A';
        const mailen = row.c[19]?.v || 'N/A';
        const statusen = row.c[20]?.v || 0;
        const sheetiden = row.c[21]?.v || 'N/A';
        const sgiden = row.c[22]?.v || 'N/A';
        const formiden = row.c[23]?.v || 'N/A';

        let formattedDate = rawDate;
        if (typeof rawDate === 'string' && rawDate.startsWith('Date')) {
            formattedDate = parseGoogleDate(rawDate);
        }

        const uniqueId = `viewbtn-${i}`;

        transactions.push({
            Name, Land, Status, formattedDate, sheetid, sheetid2, sgid, sgid2, formid,
            formid2, sdentry, sdentry2, srentry, srentry2, saentry, saentry2,
            nameen, phoneen, houseen, mailen, statusen, sheetiden, sgiden, formiden,
            html: `
<div class="transaction" style="display: flex; justify-content: space-between;">
    <div style="flex: 0.5; text-align: center;">
        ${serialNumber}
    </div>
    <div style="flex: 1; text-align: center; line-height: 1.5; margin-left: 60px;">
        ${Name}
    </div>
    <div style="flex: 1; text-align: left; line-height: 1.5; margin-left: 45px;margin-right:10px">
        ${Land}
    </div>
    <div style="flex: 1; text-align: center;">
        ${getStatusIcon(Status)} ${Status}
    </div>
    <div style="flex: 1; text-align: right;">
        ${formattedDate}
    </div>
    <div style="flex: 1; text-align: right;">
        <button class="redirect-btn" id="${uniqueId}">OPEN</button>
    </div>
</div>`
        });
        document.querySelector('.loader').style.display = 'none';
        container.innerHTML += transactions[transactions.length - 1].html;
        serialNumber--;

        // Attach event listener for the "OPEN" button
        attachRedirectEvent(uniqueId, transactions[transactions.length - 1]);
    }
}

function attachRedirectEvent(buttonId, transaction) {
    setTimeout(() => {
        document.getElementById(buttonId).addEventListener('click', (event) => {
            event.preventDefault();
            saveAndRedirect(transaction);
        });
    }, 300);
}

function saveAndRedirect(transaction) {
    localStorage.removeItem("devdata");
    const devdata = {
        name: transaction.Name,
        land: transaction.Land,
        status: transaction.Status,
        sheetid: transaction.sheetid,
        sheetid2: transaction.sheetid2,
        sgid: transaction.sgid,
        sgid2: transaction.sgid2,
        formid: transaction.formid,
        formid2: transaction.formid2,
        sdentry: transaction.sdentry,
        sdentry2: transaction.sdentry2,
        srentry: transaction.srentry,
        srentry2: transaction.srentry2,
        saentry: transaction.saentry,
        saentry2: transaction.saentry2,
        nameen: transaction.nameen,
        phoneen: transaction.phoneen,
        houseen: transaction.houseen,
        mailen: transaction.mailen,
        statusen: transaction.statusen,
        sheetiden: transaction.sheetiden,
        sgiden: transaction.sgiden,
        formiden: transaction.formiden
    };
    localStorage.setItem('devdata', JSON.stringify(devdata));
    setTimeout(() => { window.location.href = 'developerid.html'; }, 300);
}

function filterTransactions() {
    const searchValue = document.getElementById('search-input').value.toLowerCase();
    const container = document.getElementById('transaction-list');
    container.innerHTML = '';

    transactions.forEach((transaction, index) => {
        if (
            transaction.Name.toLowerCase().includes(searchValue) ||
            transaction.formattedDate.toLowerCase().includes(searchValue) ||
            transaction.Land.toString().toLowerCase().includes(searchValue) ||
            transaction.Status.toLowerCase().includes(searchValue) ||
            transaction.phoneen.toString().includes(searchValue)
        ) {
            
            container.innerHTML += transaction.html;
            const uniqueId = `viewbtn-${transactions.length - 1 - index}`;
            attachRedirectEvent(uniqueId, transaction);
        }
    });
}

function parseGoogleDate(dateString) {
    const regex = /Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)/;
    const matches = dateString.match(regex);

    if (matches) {
        const year = matches[1];
        const month = String(parseInt(matches[2]) + 1).padStart(2, '0');
        const day = String(matches[3]).padStart(2, '0');
        return `${day}/${month}/${year}`;
    }

    return 'Invalid Date';
}

function getStatusIcon(status) {
    switch (status.toLowerCase()) {
            case '01718592869':
            return '<i class="fa-duotone fa-solid fa-phone" style="color:blue;"></i>';
        default:
            return '<i class="fa-solid fa-phone-volume" style="color:black;"></i>';
    }
}
    </script>
